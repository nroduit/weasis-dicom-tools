name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [ opened, synchronize, reopened ]
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK for compilation
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and test
        run: mvn -Pcoverage -f weasis-dicom-tools -B verify
      # Sonar analysis runs in a separate workflow_run-triggered workflow (sonar.yml) so it
      # has access to SONAR_TOKEN even for pull requests from forks and Dependabot.
      - name: Save PR context for Sonar analysis
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr-context
          echo "${{ github.event.pull_request.number }}" > pr-context/pr_number
          echo "${{ github.event.pull_request.head.ref }}" > pr-context/head_ref
          echo "${{ github.event.pull_request.base.ref }}" > pr-context/base_ref
      - name: Upload PR context
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-context
          path: pr-context/
          retention-days: 1