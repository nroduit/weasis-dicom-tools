name: Build and publish release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: master
          path: main
          persist-credentials: false
      - name: Set up JDK for compilation
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build weasis-dicom-tools
        run: mvn -B clean install -f main
      - name: Extract Maven project version
        run: |
          cd main
          MVN_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          echo "LIB_VERSION=${MVN_VERSION}" >> $GITHUB_ENV
        id: project
      - name: Checkout mvn-repo repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: nroduit/mvn-repo
          path: mvn-repo
          token: ${{ secrets.API_TOKEN_GITHUB }}
      - name: Commit the maven packages
        run: |
          cd mvn-repo
          VERSION=${{ env.LIB_VERSION }}

          publish() {
            local pkg=$1
            local src=~/.m2/repository/${pkg}/${VERSION}
            mkdir -p "${pkg}/${VERSION}"
            cp -v ${src}/*.jar "${pkg}/${VERSION}/" 2>/dev/null || true   # bom has no jar
            cp -v ${src}/*.pom "${pkg}/${VERSION}/"
          }
          publish org/weasis/weasis-dicom-tools
          publish org/weasis/weasis-dicom-tools-bom

          # Single source of truth: regenerate maven-metadata.xml + .sha1/.md5.
          python3 update-repo.py

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "Add weasis-dicom-tools ${VERSION} release"
          git push
